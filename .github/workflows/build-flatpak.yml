name: CI

on:
  push:
    branches:
      - main  # Triggers on pushes to the main branch
  pull_request:
    branches:
      - main  # Triggers on pull requests targeting the main branch

jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-44
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir Telegram.TelegramDesktop.Store.yml

      - name: Package Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean --create-gpg-signature Telegram.TelegramDesktop.Store.flatpak build-dir Telegram.TelegramDesktop.Store.yml

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Telegram.TelegramDesktop.Store.flatpak
          path: Telegram.TelegramDesktop.Store.flatpak
